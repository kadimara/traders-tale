name: Database Backup

on:
  schedule:
    - cron: '0 3 * * 0' # Every Sunday at 03:00 UTC
  workflow_dispatch:     # Allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Dump schema
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            "postgresql://postgres@db.rhrbxtmqrpbnoyylgsyl.supabase.co:5432/postgres" \
            --schema-only \
            --no-password \
            -f schema.sql

      - name: Dump data
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          pg_dump \
            "postgresql://postgres@db.rhrbxtmqrpbnoyylgsyl.supabase.co:5432/postgres" \
            --data-only \
            --use-insert \
            --no-password \
            -f data.sql

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: |
            schema.sql
            data.sql
          retention-days: 90
